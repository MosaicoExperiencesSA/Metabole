<text x="540" y="752" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="32" fill="#16302C">Sei il motore che non si ferma:</text>
<text x="540" y="792" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="32" fill="#16302C">e noi lo vediamo.</text>
<text x="540" y="862" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" fill="#0E5A49">Il tuo posto, a bordo, è pronto.</text>
