  .link{font-size:12px;color:#12A386;text-decoration:underline;cursor:pointer;display:inline-block;margin-top:10px}

</head>

    var ic=integ.map(function(p){return '<div class="card" style="display:flex;align-items:center;gap:11px;padding:11px 13px;margin-bottom:9px">'+bdg(p[3],40,p[4],p[5])+'<div style="flex:1"><div style="font-size:13px;font-weight:600">'+p[0]+'</div><div class="sub" style="font-size:11px">'+p[1]+'</div></div><div style="text-align:right"><div style="font-weight:600;font-size:14px">'+p[2]+'</div><span class="btn" style="padding:4px 10px;font-size:11px;margin-top:4px"><i class="ti ti-plus" style="font-size:12px"></i> Aggiungi</span></div></div>';}).join('');
    return '<div style="padding:15px"><span class="back" data-nav="home"><i class="ti ti-chevron-left"></i> Home</span>'
      +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">'+bdg('ti-shopping-bag',32,'#EFEAF9','#6C5AB7')+'<div><div class="h1">Negozio</div><div class="sub">Piani e integratori</div></div></div>'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:8px">Piani</div>'
      +'<div class="card" style="border:2px solid #12A386;display:flex;align-items:center;gap:10px"><div style="flex:1"><span class="tag" style="background:#DCF0D8;color:#3B6D11">Più scelto</span><div style="font-size:14px;font-weight:600;margin-top:5px">Percorso 3 mesi</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:600">€ 267</div><span class="btn" style="padding:5px 11px;margin-top:5px">Acquista</span></div></div>'
      +'<div style="font-size:13px;font-weight:600;margin:14px 0 8px">Integratori</div>'+ic
      +'</div>';};

  var SHEETS={
    fame:{t:'Ho fame adesso',b:'Bevi un bicchiere d\'acqua e prendi un frutto o dei semi: spesso la fame passa in 15 minuti. Se ti capita spesso di pomeriggio, lo segnalo a Sara e anticipiamo lo spuntino.',cta:'Chiedi a Sara'},
    fuori:{t:'Mangio fuori',b:'Scegli una proteina con verdure, evita bevande zuccherate e concediti un piccolo piacere senza sensi di colpa. Domani ti preparo un rientro morbido, tranquilla.',cta:'Ok, grazie'},
    sost:{t:'Sostituisci un ingrediente',b:'Non hai un ingrediente o non ti piace? Alternativa equivalente: al posto del farro, quinoa o orzo. Vuoi che aggiorni la ricetta di oggi?',cta:'Aggiorna ricetta'}
  };
  function openHelp(k){var s=SHEETS[k];openSheet('<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">'+bdg('ti-sparkles',30,'#12A386','#fff')+'<b style="font-size:15px">'+s.t+'</b></div><div style="font-size:13px;line-height:1.6;color:#2E3E3B;margin-bottom:14px">'+s.b+'</div><button class="btn" data-close style="width:100%;justify-content:center;padding:11px">'+s.cta+'</button>');}
  function openCoach(){openSheet('<div style="display:flex;align-items:center;gap:9px;margin-bottom:4px"><span style="width:36px;height:36px;border-radius:50%;background:#DCEBE3;color:#0E7C66;display:inline-flex;align-items:center;justify-content:center;font-weight:600">SC</span><div><b style="font-size:15px">Sara — la tua coach</b><div class="sub" style="font-size:11px">Domande sanitarie? Ti giro alla nutrizionista.</div></div></div><div style="display:flex;flex-direction:column;gap:8px;margin:12px 0">'
    +'<div style="align-self:flex-start;max-width:82%;background:#F4F1EA;border-radius:14px;padding:9px 11px;font-size:12.5px">Ciao Giulia! Come procede questa settimana?</div>'
    +'<div style="align-self:flex-end;max-width:82%;background:#12A386;color:#fff;border-radius:14px;padding:9px 11px;font-size:12.5px">Bene, un po\' di fame il pomeriggio</div>'
    +'<div style="align-self:flex-start;max-width:82%;background:#F4F1EA;border-radius:14px;padding:9px 11px;font-size:12.5px">Perfetto, anticipiamo lo spuntino. Ci vediamo in televisita il 22!</div></div>'
    +'<div style="display:flex;gap:8px"><input class="inp" style="flex:1;border-radius:22px" placeholder="Scrivi a Sara…"><span class="btn" data-close style="padding:10px 12px"><i class="ti ti-send"></i></span></div>');}
  function openSpesa(){var items=['Farro','Petto di pollo','Yogurt greco','Avena','Frutta fresca','Zucchine','Pomodorini','Orata','Patate'];
    openSheet('<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">'+bdg('ti-basket',30,'#DCEBE3','#0E7C66')+'<div><b style="font-size:15px">Lista della spesa</b><div class="sub" style="font-size:11px">Per i prossimi 2 giorni</div></div></div>'
      +items.map(function(it){return '<div class="spitem" style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid #F0ECE3;cursor:pointer"><span class="ck" style="width:22px;height:22px;border-radius:7px;border:2px solid #CFE0D8;display:inline-flex;align-items:center;justify-content:center;flex:none"></span><span style="font-size:13px">'+it+'</span></div>';}).join('')
      +'<button class="btn" data-close style="width:100%;justify-content:center;padding:11px;margin-top:14px">Chiudi</button>');}

  var inner=document.getElementById('inner');
  function POPUP(){return '<div id="checkin" style="position:absolute;inset:0;background:rgba(11,15,14,.45);display:flex;align-items:flex-end;z-index:20"><div style="width:100%;background:#fff;border-radius:22px 22px 0 0;padding:16px 16px 20px;box-shadow:0 -6px 20px rgba(0,0,0,.18)"><div style="width:40px;height:4px;background:#E2DED4;border-radius:3px;margin:0 auto 12px"></div><b style="font-size:16px">Come ti senti oggi?</b><div class="sub" style="margin:3px 0 14px">Un check-in veloce prima di iniziare la giornata.</div><div class="mood" style="display:flex;justify-content:space-between">'+[['😍','Alla grande','#E4F3DC','#3B6D11'],['😄','Bene','#EAF3D9','#4D7C0F'],['😐','Media','#FBF0D6','#8A5A0B'],['😣','Dura','#FBE6DC','#B4491F'],['🤯','Stress','#F7DAD6','#993C1D']].map(function(e){return '<div class="mbtn" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><span style="width:44px;height:44px;border-radius:14px;background:'+e[2]+';display:flex;align-items:center;justify-content:center;font-size:24px">'+e[0]+'</span><span style="font-size:9px;color:'+e[3]+'">'+e[1]+'</span></div>';}).join('')+'</div><div data-skip style="text-align:center;margin-top:14px;cursor:pointer"><span class="sub">Salta per oggi</span></div></div></div>';}
  function renderDateInfo(){var di=document.getElementById('dateInfo');if(!di)return;var vis=addDays(start,-2);di.innerHTML='<div style="display:flex;align-items:flex-start;gap:9px"><i class="ti ti-eye" style="color:#0E7C66;font-size:18px"></i><div><div style="font-size:12.5px;color:#0E7C66;font-weight:600">Menu visibile dal '+fmt(vis)+'</div><div class="sub" style="font-size:11px;margin-top:2px">Si sblocca 2 giorni prima dell\'inizio.</div></div></div>';}
  function openSheet(html){var d=document.createElement('div');d.className='sheet';d.id='ov';d.innerHTML='<div class="sheetc"><div class="grab"></div>'+html+'</div>';inner.appendChild(d);
    d.addEventListener('click',function(e){if(e.target===d)closeSheet();});
    d.querySelectorAll('[data-close]').forEach(function(b){b.addEventListener('click',closeSheet);});
    d.querySelectorAll('.spitem').forEach(function(it){it.addEventListener('click',function(){var ck=it.querySelector('.ck');var on=ck.getAttribute('data-on')==='1';ck.setAttribute('data-on',on?'0':'1');ck.style.background=on?'transparent':'#12A386';ck.style.borderColor=on?'#CFE0D8':'#12A386';ck.innerHTML=on?'':'<i class="ti ti-check" style="font-size:14px;color:#fff"></i>';it.style.opacity=on?'1':'.6';});});
  }
  function closeSheet(){var o=document.getElementById('ov');if(o)o.remove();}

  function render(){
    clearInterval(cdTimer);
    if(state.phase==='flow'){
      var st=F[state.step];
      if(st.intro){
        inner.innerHTML=introHTML(st);gaiaPlay('intro_'+st.sec,SEC[st.sec].gaia);
      } else {
      inner.innerHTML='<div class="ftop"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span id="bk" class="back" style="margin:0;visibility:'+(state.step===0?'hidden':'visible')+'"><i class="ti ti-chevron-left"></i> Indietro</span><span class="sub" style="font-size:11px">Passo '+(state.step+1)+' di '+F.length+'</span></div><div class="prog"><span style="width:'+Math.round((state.step+1)/F.length*100)+'%"></span></div></div>'
        +'<div class="pbody">'+(st.sec?secbar(st.sec):'')+st.c()+'</div>'
        +'<div class="bottombar"><button class="cta" id="cta">'+st.btn+'</button></div>';
      if(st.gaia)gaiaPlay(st.gaiaKey||'',st.gaia);
      }
    } else {
      inner.innerHTML='<div class="pbody" style="padding-bottom:84px">'+(S[state.screen]||S.home)()+'</div><div class="tabbar" id="tb"></div>'+(state.checkinDone?'':POPUP());
      document.getElementById('tb').innerHTML=ORDER.map(function(k){var n=NAV[k],on=k===state.screen;
        if(k==='home'){return '<div class="tab" data-nav="home" style="background:#12A386;color:#fff"><i class="ti ti-home"></i></div>';}
        return '<div class="tab" data-nav="'+k+'" style="'+(on?'background:'+n[3]+';':'')+'color:'+n[2]+'"><i class="ti '+n[0]+'"></i></div>';
      }).join('');
      if(state.screen==='home'){var ck0=state.coach||coachNow();if(COACHST[ck0])gaiaPlay('coach_'+ck0,COACHST[ck0].say);}
    }
    wire();
  }
  function wire(){
    var root=document.querySelector('.phone');
    var ci=document.getElementById('checkin');
    if(ci)ci.querySelectorAll('.mbtn,[data-skip]').forEach(function(b){b.addEventListener('click',function(){state.checkinDone=true;render();});});
    var cta=document.getElementById('cta');
    if(cta)cta.addEventListener('click',function(){ var st=F[state.step]; if(st.go){state.phase='app';state.screen=st.go;render();return;} if(state.step<F.length-1){state.step++;render();} });
    var bk=document.getElementById('bk');
    if(bk)bk.addEventListener('click',function(){ if(state.phase==='flow'&&state.step>0){state.step--;render();} });
    var sd=document.getElementById('startDate');
    if(sd){renderDateInfo();sd.addEventListener('change',function(){var p=sd.value.split('-');start=new Date(+p[0],+p[1]-1,+p[2]);renderDateInfo();});}
    var su=document.getElementById('simUnlock');
    if(su)su.addEventListener('click',function(){state.step=F.length-1;render();});
    if(document.getElementById('okg')){document.getElementById('okg').addEventListener('input',calcObj);document.getElementById('owk').addEventListener('input',calcObj);calcObj();}
    var cols=document.getElementById('cols');if(cols)cols.querySelectorAll('.sw').forEach(function(s){s.addEventListener('click',function(){cols.querySelectorAll('.sw').forEach(function(x){x.style.borderColor='transparent';});s.style.borderColor='#0B302B';var c=s.getAttribute('data-c');state.brand=c;document.documentElement.style.setProperty('--brand',c);});});
    root.querySelectorAll('[data-nav]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();state.screen=el.getAttribute('data-nav');render();});});
    root.querySelectorAll('[data-open]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var k=el.getAttribute('data-open');if(k==='coach')openCoach();else if(k==='spesa')openSpesa();else openHelp(k);});});
    root.querySelectorAll('[data-coachcycle]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var cur=state.coach||coachNow();var i=(COACHORD.indexOf(cur)+1)%COACHORD.length;state.coach=COACHORD[i];render();});});
    root.querySelectorAll('[data-spk]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();audioOn=true;gaiaUnlocked=true;var ic=el.querySelector('i');if(ic)ic.className='ti ti-volume';if(curKey)gaiaPlay(curKey,curGaia);else gaiaSpeak(curGaia);});});
    root.querySelectorAll('input[data-reveal]').forEach(function(el){el.addEventListener('input',function(){if(el.value.trim()&&!el._d){el._d=1;var rv=el.getAttribute('data-reveal');var te=document.getElementById(rv);if(te)te.style.display='';var dsk=el.getAttribute('data-saykey'),dst=el.getAttribute('data-say');if(dsk||dst)gaiaPlay(dsk||'',dst||'');}});});
    var cdEl=document.getElementById('cdNum');if(cdEl){var cn=parseInt(cdEl.textContent,10)||10;clearInterval(cdTimer);cdTimer=setInterval(function(){cn--;if(cdEl)cdEl.textContent=cn;if(cn<=0){clearInterval(cdTimer);if(state.phase==='flow'){state.step++;render();}}},1000);}
    var wb=document.getElementById('wbtn');
    if(wb)wb.addEventListener('click',function(){if(water<wgoal)water++;var wd=document.getElementById('wd');if(wd)wd.innerHTML=drops();var wc=document.getElementById('wc');if(wc)wc.textContent=water;});
    root.querySelectorAll('[data-day]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();state.menuDay=el.getAttribute('data-day');render();});});
    root.querySelectorAll('.opts').forEach(function(g){var multi=g.getAttribute('data-multi')==='1';function paint(){g.querySelectorAll('.opt').forEach(function(x){var ind=x.querySelector('.ind');if(ind)ind.innerHTML=x.classList.contains('on')?'<i class="ti ti-check"></i>':'';});}g.querySelectorAll('.opt').forEach(function(o){o.addEventListener('click',function(){ if(multi){o.classList.toggle('on');paint();return;} g.querySelectorAll('.opt').forEach(function(x){x.classList.remove('on');});o.classList.add('on');paint();var sh=o.getAttribute('data-show');if(sh){var p=g.getAttribute('data-panel');root.querySelectorAll('.mpanel').forEach(function(mp){if(mp.id&&mp.id.charAt(0)===p)mp.style.display='none';});var t=document.getElementById(sh);if(t)t.style.display='';}var rv=o.getAttribute('data-reveal');if(rv){var te=document.getElementById(rv);if(te)te.style.display='';}var dsk=o.getAttribute('data-saykey'),dst=o.getAttribute('data-say');if(dsk||dst)gaiaPlay(dsk||'',dst||'');});});});
    var sc=document.getElementById('mealScroll');
    if(sc){var md=document.getElementById('mealDots'),mn=sc.children.length;var mdot=function(a){if(!md)return;var s='';for(var q=0;q<mn;q++){s+='<span style="width:6px;height:6px;border-radius:50%;background:'+(q===a?'#12A386':'#D6DED9')+'"></span>';}md.innerHTML=s;};mdot(0);root.querySelectorAll('[data-slide]').forEach(function(el){el.addEventListener('click',function(){var i=+el.getAttribute('data-slide');sc.scrollTo({left:i*sc.clientWidth,behavior:'smooth'});});});sc.addEventListener('scroll',function(){var i=Math.round(sc.scrollLeft/sc.clientWidth);root.querySelectorAll('.daytabs .opt').forEach(function(x,idx){x.classList.toggle('on',idx===i);});mdot(i);});}
    var hs=document.getElementById('homeScroll'),hd=document.getElementById('homeDots');
    if(hs&&hd){var hn=hs.children.length;var hdot=function(a){var s='';for(var q=0;q<hn;q++){s+='<span style="width:6px;height:6px;border-radius:50%;background:'+(q===a?'#12A386':'#D6DED9')+'"></span>';}hd.innerHTML=s;};hdot(0);hs.addEventListener('scroll',function(){hdot(Math.round(hs.scrollLeft/hs.clientWidth));});}
    var stars=root.querySelectorAll('.stars i');
    stars.forEach(function(s){s.addEventListener('click',function(){var n=+s.getAttribute('data-s');stars.forEach(function(x){x.style.color=+x.getAttribute('data-s')<=n?'#d8b24a':'#d8d3c6';});var m=document.getElementById('rateMsg');if(m){m.style.display='';m.textContent=n>=4?'Ti è piaciuta: te la riproporrò più spesso.':(n<=2?'Capito, la eviterò quasi del tutto.':'Valutazione salvata.');m.style.color=n<=2?'#993C1D':'#0E7C66';}});});
  }
  render();
  document.addEventListener('pointerdown',gaiaUnlock);
  document.addEventListener('click',gaiaUnlock);
})();
</script>
