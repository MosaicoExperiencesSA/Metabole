<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metabole — Prototipo (versione definitiva)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  body{margin:0;background:#EAEDEC;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#101826;padding:24px 0}
  .mw{display:flex;justify-content:center}
  .phone{width:304px;height:634px;display:flex;flex-direction:column;background:#FFFFFF;border:11px solid #0B0F0E;border-radius:52px;overflow:hidden;position:relative;box-shadow:0 20px 46px rgba(16,64,58,.24)}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:96px;height:24px;background:#000;border-radius:14px;z-index:9}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:13px 26px 4px;font-size:11px;color:#16302C;font-weight:600;flex:none}
  #inner{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
  .ftop{padding:6px 16px 4px;flex:none}
  .prog{height:5px;background:#EDF0EF;border-radius:4px;overflow:hidden}
  .prog>span{display:block;height:100%;background:var(--brand,#12A386);border-radius:4px}
  .pbody{flex:1;overflow:auto;padding:6px 12px}
  .bottombar{flex:none;padding:10px 16px}
  .tabbar{position:absolute;left:0;right:0;bottom:0;display:flex;background:#fff;border-top:1px solid #EEF1F0;padding:8px 4px 11px;box-shadow:0 -8px 22px rgba(16,48,42,.06);z-index:8}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#B4BEBA}
  .tab i{font-size:23px}
  .tab.on{color:#fff}
  .tab.on i{background:var(--brand,#12A386);width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(18,163,134,.42);margin-top:-16px}
  .apphdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px;flex:none}
  .hicon{width:36px;height:36px;border-radius:12px;background:#F2F5F4;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;color:#3A4A46}
  .hicon i{font-size:16px}
  .hbadge{position:absolute;top:-5px;right:-5px;min-width:14px;height:14px;padding:0 3px;border-radius:8px;background:#E8543C;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;box-sizing:border-box}
  .seg{display:flex;background:#F2F5F4;border-radius:13px;padding:3px;gap:3px;margin-bottom:12px}
  .seg .s{flex:1;text-align:center;padding:7px 4px;font-size:12px;font-weight:600;color:#7C8C88;border-radius:10px;cursor:pointer}
  .seg .s.on{background:#fff;color:#101826;box-shadow:0 2px 7px rgba(16,48,42,.10)}
  .drow{display:flex;gap:9px;overflow-x:auto;padding:2px 0 6px;scroll-snap-type:x mandatory}
  .dcard{min-width:80px;scroll-snap-align:start;border:1px solid #EEF1F0;border-radius:14px;padding:9px 8px;text-align:center;cursor:pointer;background:#fff;box-shadow:0 4px 12px rgba(16,48,42,.05);flex:none}
  .dcard.on{border-color:var(--brand,#12A386);box-shadow:0 6px 16px rgba(18,163,134,.16)}
  .row{display:flex;align-items:center;gap:11px;padding:11px 6px;cursor:pointer}
  .reveal5{opacity:0;transform:translateY(12px);animation:rev5 .55s ease forwards}
  @keyframes rev5{to{opacity:1;transform:none}}
  .gmtalk{transform-box:fill-box;transform-origin:center;animation:gmt .17s ease-in-out infinite}
  @keyframes gmt{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.9)}}
  .aip{font-weight:800;animation:aipul 1.5s ease-in-out infinite}
  @keyframes aipul{0%,100%{opacity:1}50%{opacity:.35}}
  .ailit{animation:ailit 1.7s ease-in-out infinite}
  @keyframes ailit{0%,100%{box-shadow:0 0 0 0 rgba(108,76,214,.55)}50%{box-shadow:0 0 0 7px rgba(108,76,214,0)}}
  .livedot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:livep 1.3s ease-in-out infinite}
  @keyframes livep{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.55)}}
  .homeind{height:5px;width:120px;background:#0B302B;opacity:.28;border-radius:5px;margin:3px auto 8px;flex:none}
  .h1{font-size:17px;font-weight:600}
  .sub{font-size:12px;color:#7C8C88}
  .lab{font-size:12px;color:#5F6E6B;margin:12px 0 6px;font-weight:500}
  .sec{font-size:13px;font-weight:600;margin:6px 2px 8px}
  .card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 20px rgba(16,48,42,.07);border:1px solid #EEF1F0;margin-bottom:11px}
  .bdg{border-radius:12px;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .cta{width:100%;background:var(--brand,#12A386);color:#fff;border:none;border-radius:24px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 6px 14px rgba(18,163,134,.3)}
  .ghost{width:100%;background:#fff;color:#10403A;border:1px solid #E7EBE9;border-radius:24px;padding:11px;font-size:14px;cursor:pointer;margin-top:8px}
  .btn{background:var(--brand,#12A386);color:#fff;border:none;border-radius:20px;padding:7px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .btn.c{background:#E8825A}
  .inp{width:100%;border:1px solid #E7EBE9;border-radius:12px;padding:10px 12px;font-size:14px;outline:none;box-sizing:border-box;background:#fff}
  .chip{border:1px solid #E7EBE9;background:#fff;border-radius:20px;padding:7px 11px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .opts{display:flex;gap:6px;flex-wrap:wrap}
  .opts .opt{border:1px solid #E7EBE9;background:#fff;border-radius:20px;padding:7px 12px;font-size:13px;cursor:pointer}
  .opts .opt.on{background:var(--brand,#12A386);color:#fff;border-color:var(--brand,#12A386)}
  .opts.stack{flex-direction:column;flex-wrap:nowrap;gap:9px}
  .opts.stack .opt{display:flex;align-items:center;gap:11px;width:100%;box-sizing:border-box;min-height:52px;padding:13px 14px;border:1.5px solid #E7EBE9;background:#fff;border-radius:14px;font-size:14px;color:#2b2822;cursor:pointer;text-align:left}
  .opts.stack .opt .ind{width:22px;height:22px;border-radius:50%;border:2px solid #cfcabb;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
  .opts.stack[data-multi] .opt .ind{border-radius:7px}
  .opts.stack .opt.on{border-color:var(--brand,#12A386);background:#EAF6F1;color:#0E7C66;font-weight:500}
  .opts.stack .opt.on .ind{border-color:var(--brand,#12A386);background:var(--brand,#12A386)}
  .secbar{display:flex;gap:4px;margin-bottom:5px}
  .secbar span{height:5px;flex:1;border-radius:3px;background:#EDF0EF}
  .secbar span.on{background:var(--brand,#12A386)}
  .seclbl{display:flex;justify-content:space-between;font-size:9px;color:#B3AFA4;margin-bottom:12px}
  .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:11px;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .meal{min-width:100%;box-sizing:border-box;scroll-snap-align:start;margin:0;padding:0;overflow:hidden}
  .wd{white-space:nowrap;overflow-x:auto;margin:7px 0;padding-bottom:2px}
  .bar{height:9px;background:#EEF3F0;border-radius:6px;overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:6px}
  .stars i{color:#d8d3c6;font-size:22px;cursor:pointer}
  .back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#7C8C88;cursor:pointer;margin-bottom:8px}
  .tag{font-size:10px;padding:3px 8px;border-radius:20px}
  .link{font-size:12px;color:var(--brand,#12A386);text-decoration:underline;cursor:pointer;display:inline-block;margin-top:10px}
  .sheet{position:absolute;inset:0;background:rgba(11,15,14,.45);display:flex;align-items:flex-end;z-index:30}
  .sheetc{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:16px;max-height:88%;overflow:auto;box-shadow:0 -6px 20px rgba(0,0,0,.18)}
  .grab{width:40px;height:4px;background:#E7EBE9;border-radius:3px;margin:0 auto 12px}
</style>
</head>

<div class="mw"><div class="phone"><div class="island"></div><div class="statusbar"><span>9:41</span><span><i class="ti ti-wifi" style="font-size:13px"></i> <i class="ti ti-battery-3" style="font-size:14px"></i></span></div><div id="inner"></div><div class="homeind"></div></div></div>
<script>
(function(){
  var state={phase:'flow',step:0,screen:'home',menuDay:'oggi',checkinDone:false,needMeasures:true};
  var water=5, wgoal=8;
  // === Tracciamento (hook unico per il backend) =========================
  // Il socio deve solo sostituire il corpo di track() con una POST reale a
  // /api/v1/events (append-only). Ogni click/decisione utile passa di qui.
  var MBSESSION='sess_'+Math.random().toString(36).slice(2);
  function track(event,data){try{var payload={event:event,ts:Date.now(),session:MBSESSION,phase:state.phase,step:state.step,screen:state.screen,data:data||{}};
    // TODO backend: navigator.sendBeacon('/api/v1/events', JSON.stringify(payload));
    if(window.console&&window.console.log)console.log('[track]',event,payload);
  }catch(e){}}
  // ======================================================================
  var NAV={home:['ti-home','Home'],percorso:['ti-timeline-event','Percorso'],obiettivi:['ti-target-arrow','Obiettivi'],contatti:['ti-messages','Contatti'],agenda:['ti-calendar-heart','Agenda'],shop:['ti-shopping-bag','Shop']};
  var ORDER=['home','percorso','obiettivi','contatti','agenda'];
  var PALETTE=['#F2B807','#E23B3B','#E86FA6','#2F80ED','#12A386','#F2820A'];
  function autoColor(){var d=Math.floor(Date.now()/86400000);return PALETTE[Math.floor(d/2)%PALETTE.length];}
  function swatches(){var sel=state.brand||'#12A386';var h=PALETTE.map(function(cc){return '<span class="sw" data-c="'+cc+'" style="width:40px;height:40px;border-radius:50%;background:'+cc+';cursor:pointer;border:3px solid '+(sel===cc?'#0B302B':'transparent')+';box-shadow:0 4px 10px '+cc+'55"></span>';}).join('');h+='<span class="sw" data-c="auto" title="Auto" style="width:40px;height:40px;border-radius:50%;background:conic-gradient(from 90deg,#F2B807,#E23B3B,#E86FA6,#2F80ED,#12A386,#F2820A,#F2B807);cursor:pointer;border:3px solid '+(sel==='auto'?'#0B302B':'transparent')+';position:relative;display:inline-flex"><i class="ti ti-sparkles" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px"></i></span>';return h;}
  var OBJ=[['Peso','kg',72,68.4,66,'var(--brand,#12A386)','#0E7C66'],['Vita','cm',80,76.5,72,'#E8825A','#B4491F'],['Fianchi','cm',99,97,94,'#3A6EA5','#274E7A']];
  var CHARTS=[['Peso','kg',[72,71.3,70.6,70,69.4,69,68.7,68.4],'var(--brand,#12A386)'],['Vita','cm',[80,79.4,78.6,78,77.5,77.1,76.8,76.5],'#E8825A'],['Fianchi','cm',[99,98.6,98.2,97.8,97.5,97.2,97,97],'#3A6EA5']];
  function bdg(icon,size,bg,fg){return '<span class="bdg" style="width:'+size+'px;height:'+size+'px;background:'+bg+';color:'+fg+'"><i class="ti '+icon+'" style="font-size:'+Math.round(size*0.53)+'px"></i></span>';}
  function ring(pct,color,size){var off=Math.round(264*pct/100);return '<div style="position:relative;width:'+size+'px;height:'+size+'px;flex:none;margin:0 auto"><svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#EEF2F0" stroke-width="12"></circle><circle cx="50" cy="50" r="42" fill="none" stroke="'+color+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+off+' 264" transform="rotate(-90 50 50)"></circle></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><b style="font-size:'+Math.round(size*0.24)+'px">'+pct+'%</b></div></div>';}
  function pctOf(o){return Math.round((o[2]-o[3])/(o[2]-o[4])*100);}
  function d1(n){return n.toFixed(1).replace(".",",");}
  function thumb(up){return '<span style="width:30px;height:30px;border-radius:50%;background:'+(up?'#DCF0D8':'#F7DAD6')+';color:'+(up?'#3B6D11':'#993C1D')+';display:inline-flex;align-items:center;justify-content:center;flex:none"><i class="ti '+(up?'ti-thumb-up':'ti-thumb-down')+'" style="font-size:15px"></i></span>';}
  function chartSVG(vals,color){var w=250,h=64,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),r=(mx-mn)||1;var pts=vals.map(function(v,i){return (i/(vals.length-1)*w).toFixed(1)+','+(h-((v-mn)/r)*h*0.85-5).toFixed(1);}).join(' ');var dots=vals.map(function(v,i){return '<circle cx="'+(i/(vals.length-1)*w).toFixed(1)+'" cy="'+(h-((v-mn)/r)*h*0.85-5).toFixed(1)+'" r="3" fill="'+color+'"/>';}).join('');return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="66" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';}
  function drops(){var s='';for(var i=0;i<wgoal;i++){s+='<i class="ti ti-droplet" style="font-size:17px;color:'+(i<water?'#3AA6DE':'#D6E6F0')+';margin-right:2px"></i>';}return s;}
  function mascSVG(w,st){
    var eyes=st.eyes==='sleep'?'<path d="M84 126 Q100 136 116 126" stroke="#25384A" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M124 126 Q140 136 156 126" stroke="#25384A" stroke-width="5" stroke-linecap="round" fill="none"/>':st.eyes==='open'?'<g class="cmEye" style="transform-origin:center"><ellipse cx="100" cy="128" rx="15" ry="18" fill="#25384A"/><circle cx="94" cy="121" r="5.5" fill="#fff"/></g><g class="cmEye" style="transform-origin:center"><ellipse cx="140" cy="128" rx="15" ry="18" fill="#25384A"/><circle cx="134" cy="121" r="5.5" fill="#fff"/></g>':'<path d="M84 132 Q100 112 116 132" stroke="#25384A" stroke-width="6" stroke-linecap="round" fill="none"/><path d="M124 132 Q140 112 156 132" stroke="#25384A" stroke-width="6" stroke-linecap="round" fill="none"/>';
    var mouth=st.mouth==='big'?'M102 152 Q120 174 138 152':st.mouth==='flat'?'M106 158 L134 158':'M104 156 Q120 166 136 156';
    var cheek=st.cheek?'<ellipse cx="86" cy="150" rx="12" ry="7.5" fill="#FF9DB0" opacity=".7"/><ellipse cx="154" cy="150" rx="12" ry="7.5" fill="#FF9DB0" opacity=".7"/>':'';
    return '<svg viewBox="0 0 240 250" style="width:'+w+'px;flex:none" aria-hidden="true"><defs><linearGradient id="cmB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#93E7C8"/><stop offset="1" stop-color="#33B190"/></linearGradient><linearGradient id="cmBe" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFCF4"/><stop offset="1" stop-color="#CBF2E3"/></linearGradient><linearGradient id="cmL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A9EF7C"/><stop offset="1" stop-color="#54BD66"/></linearGradient></defs><g class="cmFloat"><g class="cmBreathe"><g class="cmSprout"><path d="M117 66 C112 44 96 40 92 46 C100 60 112 64 117 66Z" fill="url(#cmL)"/><path d="M123 66 C128 44 144 40 148 46 C140 60 128 64 123 66Z" fill="url(#cmL)"/><rect x="116" y="58" width="8" height="20" rx="4" fill="#3FA98C"/></g><ellipse cx="50" cy="168" rx="14" ry="22" fill="#57C0A2"/><ellipse cx="190" cy="168" rx="14" ry="22" fill="#57C0A2"/><path d="M120 70 C172 70 200 112 200 156 C200 208 162 226 120 226 C78 226 40 208 40 156 C40 112 68 70 120 70Z" fill="url(#cmB)"/><ellipse cx="105" cy="104" rx="40" ry="24" fill="#fff" opacity=".22"/><ellipse cx="120" cy="162" rx="50" ry="54" fill="url(#cmBe)"/><ellipse cx="98" cy="224" rx="16" ry="10" fill="#4FB495"/><ellipse cx="142" cy="224" rx="16" ry="10" fill="#4FB495"/>'+cheek+eyes+'<path class="gmouth" d="'+mouth+'" stroke="#25384A" stroke-width="5" stroke-linecap="round" fill="none"/></g></g></svg>';
  }
  var COACH_CSS='<style>@keyframes cmFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes cmBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}@keyframes cmSway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}@keyframes cmBlink{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.08)}}.cmFloat{animation:cmFloat 3.2s ease-in-out infinite}.cmBreathe{transform-box:fill-box;transform-origin:50% 92%;animation:cmBreathe 3.6s ease-in-out infinite}.cmSprout{transform-box:fill-box;transform-origin:50% 100%;animation:cmSway 3s ease-in-out infinite}.cmEye{transform-box:fill-box;animation:cmBlink 4.2s infinite}.gmouth{transform-box:fill-box;transform-origin:center}.greveal{max-height:96px;overflow-y:auto}</style>';
  var FRASI=['Non è una dieta, è il tuo nuovo stile.','Un passo alla volta è comunque un passo avanti.','I piccoli gesti di oggi sono i risultati di domani.','Bevi, respira, muoviti: il resto viene.','Sii gentile con te: stai già facendo tanto.','La costanza batte la perfezione.'];
  var COACHST={buongiorno:{bg:'#2AA7C4',head:'Buongiorno,<br>Giulia!',eyes:'happy',mouth:'big',cheek:1,say:'Buongiorno! Un nuovo giorno, un passo alla volta.'},inrotta:{bg:'var(--brand,#12A386)',head:'Sei in rotta,<br>Giulia!',eyes:'happy',mouth:'big',cheek:1,say:'Sei in rotta, continua così!'},acqua:{bg:'#2AA7C4',head:'Bevi un po\',<br>Giulia',eyes:'open',mouth:'smile',cheek:1,say:'Ricordati di bere un po\' d\'acqua.'},passi:{bg:'#D8663C',head:'Muoviti un po\'!',eyes:'happy',mouth:'big',cheek:1,say:'Muoviti un po\', ti aspetto per una camminata.'},buonanotte:{bg:'#2E2A5A',head:'Buonanotte,<br>Giulia',eyes:'sleep',mouth:'smile',cheek:1,say:'Buonanotte, riposa. Domani si ricomincia.'}};
  var COACHORD=['buongiorno','inrotta','acqua','passi','buonanotte'];
  function coachNow(){var h=new Date().getHours();if(h<11)return 'buongiorno';if(h<14)return 'inrotta';if(h<17)return 'acqua';if(h<21)return 'passi';return 'buonanotte';}
  function heroMini(ic,v,l){return '<div style="background:rgba(255,255,255,.2);border-radius:10px;padding:7px 4px;text-align:center;flex:1;min-width:0"><i class="ti '+ic+'" style="font-size:15px"></i><div style="font-size:12px;font-weight:600;margin-top:1px">'+v+'</div><div style="font-size:10px;opacity:.85">'+l+'</div></div>';}
  function hero(){var k=state.coach||coachNow();var st=COACHST[k]||COACHST.buongiorno;var fr=FRASI[new Date().getDate()%FRASI.length];
    return COACH_CSS+'<div class="ailit" data-coachcycle="1" style="background:var(--brand,#12A386);border-radius:20px;padding:14px 16px;color:#fff;position:relative;overflow:visible;margin-bottom:15px;cursor:pointer"><div style="display:flex;align-items:center;gap:13px"><div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:none">'+mascSVG(60,st)+'<i class="ti ti-volume" style="font-size:17px;opacity:.9"></i></div><div style="flex:1;min-width:0"><div style="font-size:9.5px;opacity:.9;font-weight:700;letter-spacing:.4px;white-space:nowrap"><i class="ti ti-sparkles" style="font-size:10px;vertical-align:-1px"></i> GAIA · LA FRASE DI OGGI</div><div style="font-size:15px;font-weight:700;line-height:1.3;margin-top:5px">"'+fr+'"</div></div></div></div>';
  }
  var audioOn=true,curGaia='',curKey='',gaiaAudioEl=null,gaiaUnlocked=false,GAIA_HAS_AUDIO=true,cdTimer=null,gaiaAnimStop=null,gaiaTimings={};
  var divSeq=0,divAudioEl=null;
  function pickVoice(){try{var vs=speechSynthesis.getVoices()||[];var it=vs.filter(function(v){return /^it/i.test(v.lang);});var pref=it.filter(function(v){return /google|alice|federica|elsa|natural|neural|siri/i.test(v.name);});return pref[0]||it[0]||null;}catch(e){return null;}}
  function gaiaSpeak(s){try{if(!window.speechSynthesis||!s)return;var sy=window.speechSynthesis;sy.cancel();var u=new SpeechSynthesisUtterance(s);u.lang='it-IT';var v=pickVoice();if(v)u.voice=v;u.rate=0.9;u.pitch=1.05;sy.speak(u);gaiaAnimate(s,'',null);setTimeout(function(){try{if(sy.paused)sy.resume();}catch(e){}},80);}catch(e){}}
  if(window.speechSynthesis){speechSynthesis.onvoiceschanged=function(){};speechSynthesis.getVoices();}
  function gaiaSay(t){curKey='';curGaia=(''+t).replace(/<[^>]*>/g,'').replace(/[“”]/g,'');if(audioOn)gaiaSpeak(curGaia);}

  function gaiaAnimate(txt,key,audioEl){try{
    var boxes=[].slice.call(document.querySelectorAll('.greveal'));if(!boxes.length)return;

    var prim=items[0].full;var maxLen=Math.max.apply(null,items.map(function(i){return i.full.length;}))||1;
    var tim=(key&&audioEl)?gaiaTimings[key]:null;var t0=performance.now();var estDur=Math.min(Math.max(maxLen*0.058,1.5),15);var raf=0;

    function stop(){if(raf)cancelAnimationFrame(raf);raf=0;setMouth(0);items.forEach(function(it){it.b.textContent=it.full;it.b.scrollTop=it.b.scrollHeight;});gaiaAnimStop=null;}
    gaiaAnimStop=stop;
    function frame(){var now=performance.now();var t=audioEl?(audioEl.currentTime||0):(now-t0)/1000;
      var d=(audioEl&&isFinite(audioEl.duration)&&audioEl.duration)?audioEl.duration:estDur;var frac;
      if(tim&&tim.starts&&tim.starts.length){var ci=0;while(ci<tim.starts.length&&tim.starts[ci]<=t)ci++;frac=ci/tim.starts.length;}
      else{frac=t/d;}

      items.forEach(function(it){var n=Math.round(frac*it.full.length);var s=it.full.slice(0,n);if(it.b.textContent!==s){it.b.textContent=s;it.b.scrollTop=it.b.scrollHeight;}});

  function typeSeg(s,done){var bub=document.getElementById('divText');var text=s.t;
    var mouths=[].slice.call(document.querySelectorAll('#inner .gmouth'));
    function flap(on){mouths.forEach(function(m){if(on)m.classList.add('gmtalk');else m.classList.remove('gmtalk');});}
    function typet(dur){if(!bub)return;var t0=performance.now();(function tick(){if(!bub||myId2())return;var f=Math.min(1,(performance.now()-t0)/dur);bub.textContent=text.slice(0,Math.round(f*text.length));if(f<1)requestAnimationFrame(tick);else bub.textContent=text;})();}
    function myId2(){return false;}
    function fin(){flap(false);if(bub)bub.textContent=text;done();}
    if(bub)bub.textContent='';
    function tts(){var dur=Math.max(1500,text.length*62);flap(true);typet(dur);try{if(audioOn&&window.speechSynthesis){var u=new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g,''));u.lang='it-IT';var v=pickVoice();if(v)u.voice=v;u.rate=0.98;u.onend=fin;speechSynthesis.cancel();speechSynthesis.speak(u);setTimeout(function(){try{if(speechSynthesis.paused)speechSynthesis.resume();}catch(e){}},80);return;}}catch(e){}setTimeout(fin,dur+250);}

      var to=setTimeout(function(){if(!started){try{a.pause();}catch(e){}tts();}},3500);
      a.onplaying=function(){if(started)return;started=true;clearTimeout(to);flap(true);typet((isFinite(a.duration)&&a.duration?a.duration:Math.max(1.4,text.length*0.055))*1000);};

      a.onerror=function(){clearTimeout(to);tts();};
      var p=a.play();if(p&&p.catch)p.catch(function(){clearTimeout(to);tts();});
      return;
    }catch(e){tts();return;}}

  }

      inner.innerHTML='<div class="ftop"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span id="bk" class="back" style="margin:0;visibility:'+(state.step===0?'hidden':'visible')+'"><i class="ti ti-chevron-left"></i> Indietro</span><span class="sub" style="font-size:11px">Passo '+(state.step+1)+' di '+F.length+'</span></div><div class="prog"><span style="width:'+Math.round((state.step+1)/F.length*100)+'%"></span></div></div>'
        +'<div class="pbody" style="background:'+((st.sec&&SECSOFT[st.sec])?SECSOFT[st.sec]:'#fff')+'">'+(st.sec?secbar(st.sec):'')+(st.sec?('<div style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #E7EBE9;color:'+SEC[st.sec].color+';font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 10px;border-radius:20px;margin-bottom:9px">'+SEC[st.sec].tab.toUpperCase()+'</div>'):'')+st.c()+'</div>'
        +(st.btn?'<div class="bottombar"><button class="cta" id="cta">'+st.btn+'</button></div>':'');
      if(st.gaia)gaiaPlay(st.gaiaKey||'',st.gaia);
      }
    } else {
      var sub=['ricetta'].indexOf(state.screen)>=0;
      inner.innerHTML=(sub?'':appHeader())+'<div class="pbody" style="padding:6px 0 '+(sub?'18px':'82px')+'">'+(S[state.screen]||S.home)()+'</div>'+(sub?'':'<div class="tabbar" id="tb"></div>')+(state.screen!=='home'?'':(state.needMeasures?MEASURES():(state.checkinDone?'':POPUP())));
      var tb=document.getElementById('tb');
      if(tb)tb.innerHTML=ORDER.map(function(k){var n=NAV[k],on=k===state.screen;return '<div class="tab'+(on?' on':'')+'" data-nav="'+k+'"><i class="ti '+n[0]+'"></i></div>';}).join('');
      if(state.screen==='home'&&!state.needMeasures){gaiaSay(FRASI[new Date().getDate()%FRASI.length]);}
    }
    wire();
  }
  function wire(){
    var root=document.querySelector('.phone');
    if(root&&!root._mbtrack){root._mbtrack=1;root.addEventListener('click',function(e){var s=e.target.closest?e.target.closest('[data-nav],[data-store],[data-chat],[data-pastchat],[data-menuday],[data-open],[data-adv],[data-login],[data-golo],[data-savmis],[data-next],[data-day],[data-coachcycle],.opt,.sw,.mbtn,#cta'):null;if(!s)return;track('ui_click',{nav:s.getAttribute('data-nav'),store:s.getAttribute('data-store'),chat:s.getAttribute('data-chat'),open:s.getAttribute('data-open'),color:s.getAttribute('data-c'),text:(s.textContent||'').replace(/\s+/g,' ').trim().slice(0,60)});},true);}
    if(state.phase==='flow'&&F[state.step]&&F[state.step].seq==='diversi')startDiversi();
    var ci=document.getElementById('checkin');
    if(ci){ci.querySelectorAll('[data-next]').forEach(function(b){b.addEventListener('click',function(){var a=document.getElementById('ci1'),c=document.getElementById('ci2');if(a)a.style.display='none';if(c)c.style.display='';});});
      ci.querySelectorAll('.mbtn,[data-skip]').forEach(function(b){b.addEventListener('click',function(){state.checkinDone=true;render();});});
      ci.querySelectorAll('[data-savmis]').forEach(function(b){b.addEventListener('click',function(){state.needMeasures=false;render();});});}
    var cta=document.getElementById('cta');
    if(cta)cta.addEventListener('click',function(){ var st=F[state.step]; if(st.go){state.phase='app';state.screen=st.go;render();return;} if(state.step<F.length-1){state.step++;render();} });
    var bk=document.getElementById('bk');
    if(bk)bk.addEventListener('click',function(){ if(state.phase==='flow'&&state.step>0){state.step--;render();} });
    var sd=document.getElementById('startDate');
    if(sd){renderDateInfo();sd.addEventListener('change',function(){var p=sd.value.split('-');start=new Date(+p[0],+p[1]-1,+p[2]);renderDateInfo();});}
    var su=document.getElementById('simUnlock');
    if(su)su.addEventListener('click',function(){state.step=F.length-1;render();});
    if(document.getElementById('okg')){document.getElementById('okg').addEventListener('input',calcObj);document.getElementById('owk').addEventListener('input',calcObj);calcObj();}
    var cols=document.getElementById('cols');if(cols)cols.querySelectorAll('.sw').forEach(function(s){s.addEventListener('click',function(){cols.querySelectorAll('.sw').forEach(function(x){x.style.borderColor='transparent';});s.style.borderColor='#0B302B';var c=s.getAttribute('data-c');state.brand=c;document.documentElement.style.setProperty('--brand',c==='auto'?autoColor():c);});});
    root.querySelectorAll('[data-nav]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();state.screen=el.getAttribute('data-nav');render();});});
    root.querySelectorAll('[data-open]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var k=el.getAttribute('data-open');if(k==='coach')openCoach();else if(k==='spesa')openSpesa();else openHelp(k);});});
    root.querySelectorAll('[data-coachcycle]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var cur=state.coach||coachNow();var i=(COACHORD.indexOf(cur)+1)%COACHORD.length;state.coach=COACHORD[i];render();});});
    root.querySelectorAll('[data-spk]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();audioOn=true;gaiaUnlocked=true;var ic=el.querySelector('i');if(ic)ic.className='ti ti-volume';if(curKey)gaiaPlay(curKey,curGaia);else gaiaSpeak(curGaia);});});
    root.querySelectorAll('input[data-reveal]').forEach(function(el){el.addEventListener('input',function(){if(el.value.trim()&&!el._d){el._d=1;var rv=el.getAttribute('data-reveal');var te=document.getElementById(rv);if(te)te.style.display='';var dsk=el.getAttribute('data-saykey'),dst=el.getAttribute('data-say');if(dsk||dst)gaiaPlay(dsk||'',dst||'');}});});
    var cdEl=document.getElementById('cdNum');if(cdEl){var cn=parseInt(cdEl.textContent,10)||10;clearInterval(cdTimer);cdTimer=setInterval(function(){cn--;if(cdEl)cdEl.textContent=cn;if(cn<=0){clearInterval(cdTimer);if(state.phase==='flow'){state.step++;render();}}},1000);}
    var wb=document.getElementById('wbtn');
    if(wb)wb.addEventListener('click',function(){if(water<wgoal)water++;var wd=document.getElementById('wd');if(wd)wd.innerHTML=drops();var wc=document.getElementById('wc');if(wc)wc.textContent=water;});
    root.querySelectorAll('[data-day]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();state.menuDay=el.getAttribute('data-day');render();});});
    root.querySelectorAll('[data-adv]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();if(state.phase==='flow'&&state.step<F.length-1){state.step++;render();}});});
    root.querySelectorAll('[data-login]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openLogin();});});
    root.querySelectorAll('[data-chat]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openChat(el.getAttribute('data-chat'));});});
    root.querySelectorAll('[data-menuday]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openMenuDay(+el.getAttribute('data-menuday'));});});
    root.querySelectorAll('[data-pastchat]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openPastChats(el.getAttribute('data-pastchat'));});});
    root.querySelectorAll('[data-goal]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();openGoal();});});
    root.querySelectorAll('.seg').forEach(function(g){g.querySelectorAll('.s').forEach(function(s){s.addEventListener('click',function(){g.querySelectorAll('.s').forEach(function(x){x.classList.remove('on');});s.classList.add('on');var tg=s.getAttribute('data-target');if(tg&&g.parentNode){g.parentNode.querySelectorAll('[data-seg-panel]').forEach(function(p){p.style.display=(p.getAttribute('data-seg-panel')===tg)?'':'none';});}});});});
    root.querySelectorAll('[data-tip]').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var t=document.getElementById('tip'+el.getAttribute('data-tip'));if(t){var sh=t.style.display==='none';t.style.display=sh?'':'none';var ic=el.querySelector('.caret');if(ic)ic.className='ti caret '+(sh?'ti-chevron-up':'ti-chevron-down');}});});
    root.querySelectorAll('.opts').forEach(function(g){var multi=g.getAttribute('data-multi')==='1';function paint(){g.querySelectorAll('.opt').forEach(function(x){var ind=x.querySelector('.ind');if(ind)ind.innerHTML=x.classList.contains('on')?'<i class="ti ti-check"></i>':'';});}g.querySelectorAll('.opt').forEach(function(o){o.addEventListener('click',function(){ if(multi){o.classList.toggle('on');paint();return;} g.querySelectorAll('.opt').forEach(function(x){x.classList.remove('on');});o.classList.add('on');paint();var sh=o.getAttribute('data-show');if(sh){var p=g.getAttribute('data-panel');root.querySelectorAll('.mpanel').forEach(function(mp){if(mp.id&&mp.id.charAt(0)===p)mp.style.display='none';});var t=document.getElementById(sh);if(t)t.style.display='';}var rv=o.getAttribute('data-reveal');if(rv){var te=document.getElementById(rv);if(te)te.style.display='';}var dsk=o.getAttribute('data-saykey'),dst=o.getAttribute('data-say');if(dsk||dst)gaiaPlay(dsk||'',dst||'');var stk=o.getAttribute('data-store');if(stk){state[stk]=o.textContent.replace(/\s+/g,' ').trim();}});});});
    var sc=document.getElementById('mealScroll');
    if(sc){var md=document.getElementById('mealDots'),mn=sc.children.length;var mdot=function(a){if(!md)return;var s='';for(var q=0;q<mn;q++){s+='<span style="width:6px;height:6px;border-radius:50%;background:'+(q===a?'var(--brand,#12A386)':'#D6DED9')+'"></span>';}md.innerHTML=s;};mdot(0);root.querySelectorAll('[data-slide]').forEach(function(el){el.addEventListener('click',function(){var i=+el.getAttribute('data-slide');sc.scrollTo({left:i*sc.clientWidth,behavior:'smooth'});});});sc.addEventListener('scroll',function(){var i=Math.round(sc.scrollLeft/sc.clientWidth);root.querySelectorAll('.daytabs .opt').forEach(function(x,idx){x.classList.toggle('on',idx===i);});mdot(i);});}
    var hs=document.getElementById('homeScroll'),hd=document.getElementById('homeDots');
    if(hs&&hd){var hn=hs.children.length;var hdot=function(a){var s='';for(var q=0;q<hn;q++){s+='<span style="width:6px;height:6px;border-radius:50%;background:'+(q===a?'var(--brand,#12A386)':'#D6DED9')+'"></span>';}hd.innerHTML=s;};hdot(0);hs.addEventListener('scroll',function(){hdot(Math.round(hs.scrollLeft/hs.clientWidth));});}
    var stars=root.querySelectorAll('.stars i');
    stars.forEach(function(s){s.addEventListener('click',function(){var n=+s.getAttribute('data-s');stars.forEach(function(x){x.style.color=+x.getAttribute('data-s')<=n?'#d8b24a':'#d8d3c6';});var m=document.getElementById('rateMsg');if(m){m.style.display='';m.textContent=n>=4?'Ti è piaciuta: te la riproporrò più spesso.':(n<=2?'Capito, la eviterò quasi del tutto.':'Valutazione salvata.');m.style.color=n<=2?'#993C1D':'#0E7C66';}});});
  }
  render();
  document.addEventListener('pointerdown',gaiaUnlock);
  document.addEventListener('click',gaiaUnlock);
})();
</script>
