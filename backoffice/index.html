<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metabole · Backoffice</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"
    />
  </head>
  <body>
    <script>
      // Applica il tema salvato prima del render (evita il "lampo" del tema sbagliato).
      try {
        var _t = localStorage.getItem('metabole_bo_theme') || 'light';
        document.documentElement.dataset.theme = ['light','dark','taupe','white'].indexOf(_t) >= 0 ? _t : 'light';
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
