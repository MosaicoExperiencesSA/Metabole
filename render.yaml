# Render Blueprint — Metabole backend
# New → Blueprint → collegare questo repo: Render configura tutto da qui.
# Variabili da inserire a mano nel pannello Environment:
#   DATABASE_URL  → connection string POOLED di Neon (region Francoforte)
#   BREVO_API_KEY → da Brevo, Settings → API Keys
#   MAIL_FROM     → mittente verificato su Brevo, es. Metabole <no-reply@dominio.it>
# JWT_ACCESS_SECRET viene generata automaticamente da Render (generateValue).
envVarGroups:
  - name: metabole-shared
    envVars:
      - key: CRON_SECRET
        generateValue: true # condiviso tra web service e cron job

services:
  - type: web
    name: metabole-backend
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Retry sul lock delle migrazioni: due deploy ravvicinati (push + variabile/blueprint)
    # possono contendersi l'advisory lock; il secondo tentativo dopo 20s risolve.
    preDeployCommand: (npx prisma migrate deploy || (echo 'Lock occupato, riprovo tra 20s…' && sleep 20 && npx prisma migrate deploy)) && npx prisma db seed
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # inserire a mano: Neon POOLED connection string (runtime)
      - key: DIRECT_DATABASE_URL
        sync: false # inserire a mano: Neon DIRECT connection string (senza -pooler; usata solo da migrate/seed)
      - key: BREVO_API_KEY
        sync: false # inserire a mano: API key Brevo
      - key: MAIL_FROM
        sync: false # inserire a mano: mittente verificato su Brevo
      - key: STRIPE_SECRET_KEY
        sync: false # inserire a mano: chiave segreta Stripe (sk_test_... / sk_live_...)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # inserire a mano: signing secret del webhook Stripe (whsec_...)
      - key: AI_API_KEY
        sync: false # inserire a mano: API key Anthropic (console.anthropic.com) per assistente AI + testi notifiche. Attivare poi i parametri ai_assistant_enabled / ai_composer_enabled dal backoffice.
      - key: AI_MODEL
        sync: false # opzionale: modello Claude (default claude-haiku-4-5)
      - key: ADMIN_EMAIL
        sync: false # inserire a mano: email dell'admin principale (es. simone.salogni@gmail.com)
      - key: ADMIN_PASSWORD
        sync: false # inserire a mano: password admin (min. 8 caratteri). Il seed la applica alla creazione
        # dell'account e anche se la password non è mai stata impostata (placeholder). Per FORZARE il reset
        # su un account esistente, impostare ADMIN_PASSWORD_RESET=true, fare un deploy, poi rimuovere la var.
      - key: ADMIN_PASSWORD_RESET
        sync: false # opzionale/una tantum: "true" forza il seed a reimpostare la password admin all'ADMIN_PASSWORD
        # anche su un account già esistente. Rimuovere (o mettere a false) dopo il deploy che l'ha applicata.
      - key: CORS_ORIGINS
        sync: false # inserire a mano: origini frontend consentite, separate da virgola:
        # https://app.metabole.eu,https://backoffice.metabole.eu (durante la transizione puoi
        # aggiungere anche gli URL *.vercel.app). Solo protocollo+dominio, niente slash finale.
      - key: JWT_ACCESS_SECRET
        generateValue: true # generata da Render, mai committata
      - key: FILE_ENCRYPTION_KEY
        generateValue: true # chiave di cifratura documenti sanitari (AES-256)
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: REFRESH_TTL_DAYS
        value: "30"
      - key: APP_URL
        # URL PUBBLICO DELL'APP CLIENTE (non il backend!): è dove Stripe rimanda
        # dopo il pagamento (/payment/success) e dove puntano i link nelle email.
        value: https://app.metabole.eu
      - fromGroup: metabole-shared

  # Cron giornaliero: motore + notifiche, ogni mattina alle 05:00 UTC (07:00 CEST).
  - type: cron
    name: metabole-cron-daily
    runtime: node
    region: frankfurt
    schedule: '0 5 * * *'
    rootDir: backend
    buildCommand: 'echo cron pronto'
    startCommand: 'curl -fsS -X POST -H "x-cron-secret: $CRON_SECRET" https://metabole-backend.onrender.com/api/v1/internal/cron/daily'
    envVars:
      - fromGroup: metabole-shared
